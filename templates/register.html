{% extends 'base.html' %}
{% block title %}無料登録 | Ignite Potential Base{% endblock %}

{% block content %}
<div class="page-header">
  <div class="container">
    <h1>無料会員登録</h1>
    <p>登録するとドリル・エクササイズライブラリの無料コンテンツを閲覧できます</p>
  </div>
</div>

<section class="section-sm">
  <div class="container" style="max-width:480px;">

    {% if error %}
    <div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:.75rem 1rem;margin-bottom:1.25rem;color:#f87171;font-size:.875rem;">
      {{ error }}
    </div>
    {% endif %}

    <div style="background:var(--navy-light);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:2rem;">
      <form method="POST">
        <div class="form-group">
          <label class="form-label">お名前 *</label>
          <input class="form-control" type="text" name="name" required placeholder="積山 大輝"
                 value="{{ request.form.get('name', '') }}" autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label">メールアドレス *</label>
          <input class="form-control" type="email" name="email" required placeholder="example@email.com"
                 value="{{ request.form.get('email', '') }}" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">パスワード *（8文字以上）</label>
          <input class="form-control" type="password" name="password" required minlength="8"
                 placeholder="8文字以上" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem;">
          無料で登録する
        </button>
      </form>

      <div style="margin-top:1.25rem;text-align:center;font-size:.875rem;color:var(--gray-400);">
        すでにアカウントをお持ちの方は
        <a href="{{ url_for('login') }}" style="color:var(--orange);">ログイン</a>
      </div>
    </div>

    <div style="margin-top:1.25rem;background:rgba(249,115,22,.06);border:1px solid rgba(249,115,22,.2);border-radius:10px;padding:1rem 1.25rem;font-size:.85rem;color:var(--gray-400);">
      ⭐ すべてのドリル・記事を見るには
      <a href="{{ note_url }}" target="_blank" rel="noopener" style="color:var(--orange);font-weight:700;">Noteメンバーシップ（¥1,980/月）</a>
      をご利用ください。
    </div>
  </div>
</section>
{% endblock %}
