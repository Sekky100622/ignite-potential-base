{% extends 'base.html' %}
{% block title %}パスワードをお忘れの方 | Ignite Potential Base{% endblock %}

{% block content %}
<section class="section">
  <div class="container" style="max-width:440px;">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-size:2.5rem;margin-bottom:.75rem;">🔑</div>
      <h1 style="font-size:1.75rem;font-weight:800;">パスワードをリセット</h1>
      <p class="text-gray text-sm mt-1">登録済みのメールアドレスにリセットリンクを送信します</p>
    </div>

    <div style="background:var(--navy-light);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:2rem;">
      <form method="POST" action="{{ url_for('forgot_password') }}">
        <div class="form-group">
          <label class="form-label" for="email">メールアドレス</label>
          <input class="form-control" type="email" id="email" name="email"
                 placeholder="coach@example.com" required autocomplete="email">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem;">
          リセットリンクを送信
        </button>
      </form>
    </div>

    <div style="text-align:center;margin-top:1.5rem;">
      <a href="{{ url_for('login') }}" style="color:var(--gray-400);font-size:.875rem;">← ログインに戻る</a>
    </div>
  </div>
</section>
{% endblock %}
