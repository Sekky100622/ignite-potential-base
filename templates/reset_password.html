{% extends 'base.html' %}
{% block title %}新しいパスワードを設定 | Ignite Potential Base{% endblock %}

{% block content %}
<section class="section">
  <div class="container" style="max-width:440px;">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-size:2.5rem;margin-bottom:.75rem;">🔒</div>
      <h1 style="font-size:1.75rem;font-weight:800;">新しいパスワードを設定</h1>
      <p class="text-gray text-sm mt-1">8文字以上で設定してください</p>
    </div>

    <div style="background:var(--navy-light);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:2rem;">
      {% if error %}
      <div style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:.75rem 1rem;margin-bottom:1.25rem;color:#f87171;font-size:.875rem;">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('reset_password', token=token) }}">
        <div class="form-group">
          <label class="form-label" for="password">新しいパスワード</label>
          <input class="form-control" type="password" id="password" name="password"
                 placeholder="8文字以上" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm_password">パスワード（確認）</label>
          <input class="form-control" type="password" id="confirm_password" name="confirm_password"
                 placeholder="もう一度入力" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem;">
          パスワードを更新する
        </button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
