{% extends 'base.html' %}
{% block title %}ログイン | Ignite Potential Base{% endblock %}

{% block content %}
<section class="section">
  <div class="container" style="max-width:440px;">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-size:2.5rem;margin-bottom:.75rem;">⚾</div>
      <h1 style="font-size:1.75rem;font-weight:800;">ログイン</h1>
      <p class="text-gray text-sm mt-1">Ignite Potential Baseへようこそ</p>
    </div>

    <div style="background:var(--navy-light);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:2rem;">

      {% if google_client_id %}
      <!-- Google Sign-In -->
      <div id="g_id_onload"
           data-client_id="{{ google_client_id }}"
           data-callback="handleGoogleCredential"
           data-auto_prompt="false">
      </div>
      <div style="display:flex;justify-content:center;margin-bottom:1.25rem;">
        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="filled_black"
             data-text="signin_with"
             data-size="large"
             data-logo_alignment="left"
             data-width="360">
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;">
        <div style="flex:1;height:1px;background:rgba(255,255,255,.1);"></div>
        <span style="color:var(--gray-400);font-size:.8rem;">または</span>
        <div style="flex:1;height:1px;background:rgba(255,255,255,.1);"></div>
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
          <label class="form-label" for="email">メールアドレス</label>
          <input class="form-control" type="email" id="email" name="email"
                 placeholder="coach@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">パスワード</label>
          <input class="form-control" type="password" id="password" name="password"
                 placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem;">
          ログイン
        </button>
      </form>
    </div>

    <div style="text-align:center;margin-top:1.5rem;display:flex;flex-direction:column;gap:.6rem;">
      <p class="text-gray text-sm">
        <a href="{{ url_for('forgot_password') }}" style="color:var(--gray-400);border-bottom:1px solid rgba(148,163,184,.3);">パスワードを忘れた方はこちら</a>
      </p>
      <p class="text-gray text-sm">
        まだアカウントがない方は
        <a href="{{ url_for('register') }}" style="color:var(--orange);font-weight:600;">無料登録 →</a>
      </p>
    </div>
  </div>
</section>

{% if google_client_id %}
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
function handleGoogleCredential(response) {
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = '{{ url_for("auth_google") }}';
  const input = document.createElement('input');
  input.type = 'hidden';
  input.name = 'credential';
  input.value = response.credential;
  form.appendChild(input);
  document.body.appendChild(form);
  form.submit();
}
</script>
{% endif %}
{% endblock %}
