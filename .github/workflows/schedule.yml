name: Keep Alive

on:
  schedule:
    - cron: '0 0 */4 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ping site
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ignite-potential-base.onrender.com)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "OK - site is alive"
          else
            echo "::warning::Site returned HTTP $STATUS"
          fi

      - name: Backup DB
        run: |
          pip install psycopg[binary] -q
          python3 .github/scripts/backup.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload backup
        uses: actions/upload-artifact@v4
        with:
          name: ipb-backup-${{ github.run_number }}
          path: backup_*.json
          retention-days: 90
